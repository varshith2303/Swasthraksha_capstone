spring.application.name=swasthraksha

# Enable H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================
# H2 FILE-BASED DATABASE CONFIG
# ===============================

spring.datasource.url=jdbc:h2:file:./data/swasthraksha-db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===============================
# HIKARICP CONNECTION POOL
# ===============================
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# ===============================
# JPA / HIBERNATE OPTIMIZATIONS
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Batching - reduces number of DB round trips
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# Second-level cache
spring.jpa.properties.hibernate.cache.use_second_level_cache=false

# Fetch size - pulls more rows per DB round trip
spring.jpa.properties.hibernate.jdbc.fetch_size=50

# Disable for production - reduces overhead
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ===============================
# SPRINGDOC OPENAPI CONFIG
# ===============================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ===============================
# FILE UPLOAD CONFIG
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.base-dir=uploads

